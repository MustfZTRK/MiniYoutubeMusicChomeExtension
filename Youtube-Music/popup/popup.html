<!DOCTYPE html>
<html lang="tr" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mini Youtube Music</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0f0f0f;
      --bg2: #1d1d1d;
      --bg3: #272727;
      --text: #ffffff;
      --text2: #aaaaaa;
      --accent: #ff0000;
      --border: #333333;
    }

    [data-theme="light"] {
      --bg: #ffffff;
      --bg2: #f2f2f2;
      --bg3: #e5e5e5;
      --text: #0f0f0f;
      --text2: #606060;
      --accent: #ff0000;
      --border: #e0e0e0;
    }

    body {
      width: 320px;
      min-height: 200px;
      font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      text-align: center;
    }

    .logo {
      width: 64px;
      height: 64px;
      margin-bottom: 16px;
      border-radius: 16px;
    }

    h1 {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 8px;
    }

    p {
      font-size: 13px;
      color: var(--text2);
      margin-bottom: 20px;
      line-height: 1.5;
    }

    .open-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 24px;
      background: var(--accent);
      color: #ffffff;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.2s;
    }

    .open-btn:hover {
      background: #cc0000;
    }

    .open-btn svg {
      width: 18px;
      height: 18px;
      fill: currentColor;
    }

    .hint {
      font-size: 11px;
      color: var(--text2);
      margin-top: 12px;
      opacity: 0.7;
    }
  </style>
</head>
<body>
  <img src="../icons/icon128.png" alt="YTM" class="logo">
  <h1>Mini Youtube Music</h1>
  <p>YouTube Music'i yan panelde açarak kontrol edin.</p>
  <button class="open-btn" id="openBtn">
    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z"/></svg>
    Yan Paneli Aç
  </button>
  <p class="hint">Side panel'de YouTube Music doğrudan çalışır.</p>

  <script>
    document.getElementById('openBtn').addEventListener('click', async () => {
      try {
        // Get current window
        const [tab] = await chrome.tabs.query({ active: true, currentWindow: true });
        await chrome.sidePanel.open({ windowId: tab.windowId });
        window.close();
      } catch (err) {
        console.error('Side panel error:', err);
      }
    });

    // Theme
    chrome.storage.sync.get(['theme'], (result) => {
      const theme = result.theme || 'dark';
      document.documentElement.setAttribute('data-theme', theme);
    });
  </script>
</body>
</html>
