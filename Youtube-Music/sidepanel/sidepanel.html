<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mini Youtube Music</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      height: 100%;
      overflow: hidden;
      background: #0f0f0f;
      font-family: 'Segoe UI', -apple-system, sans-serif;
    }

    /* iframe */
    #ytmFrame {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 48px;
      width: 100%; height: calc(100% - 48px);
      border: none;
    }

    /* Footer bar */
    .bar {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: 48px;
      background: #1d1d1d;
      border-top: 1px solid #333;
      z-index: 99999;
      display: flex;
      align-items: center;
      padding: 0 6px;
      gap: 4px;
    }

    .bar-art {
      width: 34px; height: 34px;
      border-radius: 4px;
      background: #333;
      object-fit: cover;
      flex-shrink: 0;
    }

    .bar-info {
      min-width: 0;
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      max-width: 90px;
    }
    .bar-title {
      font-size: 11px; font-weight: 600; color: #fff;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      line-height: 1.2;
    }
    .bar-artist {
      font-size: 9px; color: #aaa;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      line-height: 1.2;
    }

    .bar-actions {
      display: flex;
      gap: 0;
      flex-shrink: 0;
    }

    .ab {
      width: 28px; height: 28px;
      border: none; border-radius: 50%;
      background: transparent; color: #aaa;
      cursor: pointer; display: flex;
      align-items: center; justify-content: center;
      padding: 0; transition: all 0.15s;
      flex-shrink: 0;
    }
    .ab:hover { background: #3a3a3a; color: #fff; }
    .ab:active { transform: scale(0.9); }
    .ab svg { width: 15px; height: 15px; fill: currentColor; }
    .ab.liked { color: #3ea6ff; }

    .bar-sep {
      width: 1px; height: 20px;
      background: #444;
      flex-shrink: 0;
      margin: 0 2px;
    }

    .bar-play {
      display: flex;
      align-items: center;
      gap: 0;
      flex-shrink: 0;
    }

    .pb {
      width: 28px; height: 28px;
      border: none; border-radius: 50%;
      background: transparent; color: #fff;
      cursor: pointer; display: flex;
      align-items: center; justify-content: center;
      padding: 0; transition: all 0.15s;
      flex-shrink: 0;
    }
    .pb:hover { background: #3a3a3a; }
    .pb:active { transform: scale(0.9); }
    .pb svg { width: 15px; height: 15px; fill: currentColor; }

    .pb-main {
      width: 32px; height: 32px;
      background: #fff; color: #0f0f0f;
      margin: 0 2px;
    }
    .pb-main:hover { background: #fff; transform: scale(1.05); }
    .pb-main svg { width: 17px; height: 17px; }

    /* Ses butonu (footer'da sadece bu görünür) */
    .vol-wrap {
      position: relative;
      margin-left: auto;
      flex-shrink: 0;
    }

    .vol-btn {
      width: 28px; height: 28px;
      border: none; border-radius: 50%;
      background: transparent; color: #aaa;
      cursor: pointer; display: flex;
      align-items: center; justify-content: center;
      padding: 0; transition: all 0.15s;
    }
    .vol-btn:hover { color: #fff; }
    .vol-btn svg { width: 15px; height: 15px; fill: currentColor; }

    /* Dikey ses paneli */
    .vol-panel {
      position: absolute;
      bottom: 36px;
      left: 50%;
      transform: translateX(-50%);
      width: 40px;
      background: #272727;
      border: 1px solid #444;
      border-radius: 8px;
      padding: 8px 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      opacity: 0;
      pointer-events: none;
      transform-origin: bottom center;
      transition: opacity 0.2s, transform 0.2s;
      transform: translateX(-50%) scaleY(0.8);
      z-index: 100000;
    }

    .vol-panel.open {
      opacity: 1;
      pointer-events: auto;
      transform: translateX(-50%) scaleY(1);
    }

    /* Dikey slider */
    .vol-vwrap {
      position: relative;
      width: 28px;
      height: 100px;
    }
    .vol-vtrack {
      position: absolute;
      left: 50%;
      top: 4px;
      bottom: 4px;
      width: 4px;
      transform: translateX(-50%);
      background: #555;
      border-radius: 2px;
      pointer-events: none;
    }
    .vol-vfill {
      position: absolute;
      left: 0; bottom: 0;
      width: 100%;
      background: #fff;
      border-radius: 2px;
      pointer-events: none;
      transition: height 0.05s;
    }
    .vol-vthumb {
      position: absolute;
      left: 50%;
      width: 12px; height: 12px;
      border-radius: 50%;
      background: #fff;
      transform: translate(-50%, 50%);
      cursor: pointer;
      pointer-events: auto;
      box-shadow: 0 1px 4px rgba(0,0,0,0.5);
      z-index: 2;
      transition: bottom 0.05s;
    }
    /* Mute butonu (panel içinde) */
    .vol-mute {
      width: 28px; height: 28px;
      border: none; border-radius: 50%;
      background: transparent; color: #aaa;
      cursor: pointer; display: flex;
      align-items: center; justify-content: center;
      padding: 0;
      transition: all 0.15s;
    }
    .vol-mute:hover { color: #fff; background: #3a3a3a; }
    .vol-mute svg { width: 14px; height: 14px; fill: currentColor; }

    /* Ses değeri etiketi */
    .vol-label {
      font-size: 10px;
      color: #aaa;
      text-align: center;
      font-variant-numeric: tabular-nums;
    }

    .hidden { display: none !important; }
  </style>
</head>
<body>
  <iframe id="ytmFrame" src="https://music.youtube.com" allow="autoplay; encrypted-media"></iframe>

  <div class="bar">
    <img class="bar-art" id="cArt" src="" alt="">

    <div class="bar-info">
      <span class="bar-title" id="cTitle">Yükleniyor...</span>
      <span class="bar-artist" id="cArtist"></span>
    </div>

    <div class="bar-actions">
      <button class="ab" id="cLike" title="Beğen">
        <svg viewBox="0 0 24 24"><path d="M1 21h4V9H1v12zm22-11c0-1.1-.9-2-2-2h-6.31l.95-4.57.03-.32c0-.41-.17-.79-.44-1.06L14.17 1 7.59 7.59C7.22 7.95 7 8.45 7 9v10c0 1.1.9 2 2 2h9c.83 0 1.54-.5 1.84-1.22l3.02-7.05c.09-.23.14-.47.14-.73v-2z"/></svg>
      </button>
      <button class="ab" id="cSave" title="Şarkı Listesine Kaydet">
        <svg viewBox="0 0 24 24"><path d="M14 10H2v2h12v-2zm0-4H2v2h12V6zm4 8v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zM2 16h8v-2H2v2z"/></svg>
      </button>
      <button class="ab" id="cQueue" title="Kuyruğa Ekle">
        <svg viewBox="0 0 24 24"><path d="M15 6H3v2h12V6zm0 4H3v2h12v-2zM3 16h8v-2H3v2zM17 6v8.18c-.31-.11-.65-.18-1-.18-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3V8h3V6h-5z"/></svg>
      </button>
    </div>

    <div class="bar-sep"></div>

    <div class="bar-play">
      <button class="pb" id="cPrev" title="Önceki">
        <svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>
      </button>
      <button class="pb pb-main" id="cPlay" title="Oynat/Duraklat">
        <svg class="play-icon" id="cPlayIco" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
        <svg class="hidden pause-icon" id="cPauseIco" viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
      </button>
      <button class="pb" id="cNext" title="Sonraki">
        <svg viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
      </button>
    </div>

    <!-- Ses butonu + dikey panel -->
    <div class="vol-wrap">
      <div class="vol-panel" id="volPanel">
        <div class="vol-vwrap" id="cVolWrap">
          <div class="vol-vtrack"><div class="vol-vfill" id="cVolFill"></div></div>
          <div class="vol-vthumb" id="cVolThumb"></div>
        </div>
        <span class="vol-label" id="cVolLabel">70</span>
        <button class="vol-mute" id="cMute" title="Ses Aç/Kapa">
          <svg id="cVolIco" viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
        </button>
      </div>
      <button class="vol-btn" id="cVolBtn" title="Ses">
        <svg id="cVolBtnIco" viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
      </button>
    </div>
  </div>

  <script src="sidepanel.js"></script>
</body>
</html>
